{% extends 'main/base.html' %}
{% block title %}Редагування профілю - InspireBlog{% endblock %}

{% block content %}
<div class="auth-card profile-edit-card">
    <div class="auth-header">
        <h2>Налаштування профілю</h2>
        <p>Оновіть свої особисті дані та аватар</p>
    </div>

    <div class="auth-body">
        <form method="post" enctype="multipart/form-data" class="django-auto-form">
            {% csrf_token %}

            <div class="form-sections">
                {{ user_form.as_p }}

                {{ profile_form.as_p }}
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 0.9rem; border: none; cursor: pointer; margin-top: 1rem;">
                <span class="material-symbols-outlined" style="margin-right: 8px;">save</span>
                <span>Зберегти зміни</span>
            </button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'accounts:profile' %}">
                <span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle;">arrow_back</span>
                Скасувати та повернутися
            </a>
        </div>
    </div>
</div>
{% endblock %}
